name: Trigger ABS Sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Disparar sincronização ABS
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/iagofroes/appsheet_abs/actions/workflows/abs_sync.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✓ Trigger enviado para appsheet_abs"
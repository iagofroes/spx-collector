name: LineHaul Collector - 24/7

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: linehaul-collector-run
  cancel-in-progress: false

jobs:
  collect:
    name: Coletar LineHaul Trips
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Configurar token Google
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: echo "$GOOGLE_TOKEN_JSON" > token.json

      - name: Executar coletor LineHaul
        env:
          SPX_USERNAME: ${{ secrets.SPX_USERNAME }}
          SPX_PASSWORD: ${{ secrets.SPX_PASSWORD }}
          SPX_DEVICE_FINGERPRINT: ${{ secrets.SPX_DEVICE_FINGERPRINT }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          COLLECTOR_MODE: "linehaul"
          EXECUTION_INTERVAL_SECONDS: "180"
        run: timeout 21600 python spx_collector.py || true

  abs_trigger:
    name: Trigger ABS a cada 5 min
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Loop - disparar ABS a cada 5 minutos por 6 horas
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          for i in $(seq 1 72); do
            echo "[$(date '+%H:%M:%S')] Ciclo $i/72 - Disparando ABS..."
            curl -s -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_PAT" \
              https://api.github.com/repos/iagofroes/appsheet_abs/actions/workflows/abs_sync.yml/dispatches \
              -d '{"ref":"main"}'
            echo " ✓ Trigger enviado"
            sleep 300
          done
          echo "✓ 6 horas concluídas."